<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieRec</title>

  <!-- 🔥 Google Font (Premium look) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🎬 BACKGROUND (ONLY ONE GRID) -->
  <div class="bg-movie-grid" id="bgGrid"></div>
  <div class="bg-overlay"></div>

  <!-- 🔳 NAVBAR -->
  <nav class="navbar">
    <div class="logo">MovieRec</div>

    <div class="auth-buttons">
      <a href="login.html"><button class="login">Login</button></a>
      <a href="signup.html"><button class="signup">Sign Up</button></a>
    </div>

      Rate movies, explore genres, and find hidden gems.

    <div class="hero-buttons">
      <a href="signup.html">
        <button class="primary-btn">Get Started Free</button>
      </a>

      <a href="browse.html">
        <button class="secondary-btn">Browse Movies</button>
      </a>

  </section>

  <script src="script.js"></script>
