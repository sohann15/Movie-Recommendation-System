<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieRec</title>

  <!-- 🔥 Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🎬 BACKGROUND -->
  <div class="bg-movie-grid" id="bgGrid"></div>
  <div class="bg-overlay"></div>

  <!-- 🔳 NAVBAR -->
  <nav class="navbar">
    <div class="logo">MovieRec</div>

    <!-- 👇 GUEST NAV -->
    <div class="auth-buttons" id="guestNav">
      <a href="login.html"><button class="login">Login</button></a>
      <a href="signup.html"><button class="signup">Sign Up</button></a>
    </div>

    <!-- 👇 USER NAV -->
    <div class="auth-buttons" id="userNav" style="display:none;">
      <a href="browse.html"><button class="login">Browse</button></a>
      <a href="watchlist.html"><button class="login">Watchlist</button></a>
      <button class="signup" onclick="logout()">Logout</button>
    </div>

  </nav>

  <!-- 🔥 HERO SECTION -->
  <section class="hero">
    
    <h1>
      Discover Your <span>Favorite Movies</span>
    </h1>

    <p>
      Get personalized movie recommendations powered by smart algorithms.<br>
      Rate movies, explore genres, and find hidden gems.
    </p>

    <!-- 👇 GUEST BUTTONS -->
    <div class="hero-buttons" id="guestButtons">
      <a href="signup.html">
        <button class="primary-btn">Get Started Free</button>
      </a>

      <a href="browse.html">
        <button class="secondary-btn">Browse Movies</button>
      </a>
    </div>

    <!-- 👇 USER BUTTONS -->
    <div class="hero-buttons" id="userButtons" style="display:none;">
      <a href="browse.html">
        <button class="primary-btn">Browse Movies</button>
      </a>

      <a href="recommendation.html">
        <button class="secondary-btn">Recommendations</button>
      </a>
    </div>

  </section>

  <script src="script.js"></script>

  <!-- 🔥 LOGIN STATE LOGIC -->
  <script>
    function logout(){
      localStorage.removeItem("user");
      alert("Logged out");
      location.reload();
    }

    document.addEventListener("DOMContentLoaded", () => {

      const user = JSON.parse(localStorage.getItem("user"));

      if(user){
        document.getElementById("guestNav").style.display = "none";
        document.getElementById("userNav").style.display = "flex";

        document.getElementById("guestButtons").style.display = "none";
        document.getElementById("userButtons").style.display = "flex";
      }

    });
  </script>

</body>
</html>
