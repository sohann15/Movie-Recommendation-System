<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Watchlist</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0a0a0a;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:#000;
}

.logo{
  color:#d7cb20;
  font-weight:700;
  font-size:22px;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* PAGE */
.container{
  padding:40px;
}

h1{
  margin-bottom:20px;
}

/* GRID */
.watchlist-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
  gap:20px;
}

/* CARD */
.movie-card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  position:relative;
  cursor:pointer;
}

.movie-card:hover{
  transform:scale(1.05);
}

.movie-card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.movie-info{
  padding:10px;
}

.movie-info h3{
  font-size:14px;
}

.rating{
  color:#d7cb20;
}

/* REMOVE BUTTON */
.remove-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  cursor:pointer;
  font-size:16px;
}

/* EMPTY */
.empty{
  text-align:center;
  margin-top:50px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🎬 MovieRec</div>
  <div>
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">
  <h1>My Watchlist</h1>

  <div id="watchlistContainer" class="watchlist-grid"></div>
  <p id="emptyMsg" class="empty"></p>
</div>

<script>

/* ===========================
   LOAD WATCHLIST
=========================== */
async function loadWatchlist(){

  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  try{

    const res = await fetch(`http://localhost:3000/api/auth/watchlist/${user.email}`);

    if(!res.ok){
      throw new Error("Server error");
    }

    const data = await res.json();

    const container = document.getElementById("watchlistContainer");
    const emptyMsg = document.getElementById("emptyMsg");

    container.innerHTML = "";

    if(!data.watchlist || data.watchlist.length === 0){
      emptyMsg.innerText = "Your watchlist is empty 😢";
      return;
    }

    emptyMsg.innerText = "";

    const sortedMovies = [...data.watchlist].sort((a,b) => b.rating - a.rating);

    sortedMovies.forEach(movie => {

      const poster = movie.poster
        ? "https://image.tmdb.org/t/p/w500" + movie.poster
        : "https://via.placeholder.com/300x450";

      const card = document.createElement("div");
      card.classList.add("movie-card");

      card.innerHTML = `
        <button class="remove-btn"
          onclick="event.stopPropagation(); removeMovie(${movie.movieId})">×</button>

        <img src="${poster}" alt="${movie.title}">

        <div class="movie-info">
          <h3>${movie.title}</h3>
          <p class="rating">⭐ ${movie.rating || "N/A"}</p>
        </div>
      `;

      // ✅ FIXED (no backticks issue)
      card.onclick = function() {
        window.location.href = "movie.html?id=" + movie.movieId;
      };

      container.appendChild(card);
    });

  }catch(err){
    console.error("Watchlist error:", err);
    document.getElementById("emptyMsg").innerText = "Error loading watchlist";
  }
}


/* ===========================
   REMOVE MOVIE
=========================== */
async function removeMovie(movieId){

  const user = JSON.parse(localStorage.getItem("user"));

  try{

    const res = await fetch("http://localhost:3000/api/auth/watchlist/remove",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: user.email,
        movieId
      })
    });

    const data = await res.json();
    alert(data.message);

    loadWatchlist();

  }catch(err){
    console.error(err);
    alert("Error removing movie");
  }
}


/* ===========================
   INIT
=========================== */
document.addEventListener("DOMContentLoaded", loadWatchlist);

</script> `
</body>
</html>
