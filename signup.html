<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - MovieRec</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="signup-page">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🎬 MovieRec</div>

  <ul class="nav-links">
    <li>Home</li>
    <li>Browse</li>
  </ul>

  <div class="auth-buttons">
    <button class="login">Login</button>
    <button class="signup">Sign Up</button>
  </div>
</nav>

<!-- SIGNUP FORM -->
<section class="signup-container">

  <div class="signup-icon">👤</div>

  <h1>Create Your Account</h1>
  <p>Join MovieRec and get personalized recommendations</p>

  <form class="signup-form" onsubmit="event.preventDefault(); registerUser();">

    <!-- INPUT FIELDS -->
    <input type="text" id="username" placeholder="Username" required>

    <input type="email" id="email" placeholder="Email Address" required>

    <input type="password" id="password" placeholder="Password" required>

    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

    <h3>Select Your Favorite Genres (at least 1)</h3>

    <!-- GENRES -->
    <div class="genres">
      <button type="button" class="genre">Action</button>
      <button type="button" class="genre">Adventure</button>
      <button type="button" class="genre">Animation</button>
      <button type="button" class="genre">Comedy</button>
      <button type="button" class="genre">Crime</button>
      <button type="button" class="genre">Drama</button>
      <button type="button" class="genre">Family</button>
      <button type="button" class="genre">Horror</button>
      <button type="button" class="genre">Mystery</button>
      <button type="button" class="genre">Romance</button>
      <button type="button" class="genre">Sci-Fi</button>
      <button type="button" class="genre">Thriller</button>
    </div>

    <!-- CREATE ACCOUNT BUTTON -->
    <button type="submit" class="create-btn">Create Account</button>

  </form>

</section>

<!-- JAVASCRIPT -->
<script src="script.js"></script>

</body>
</html>
